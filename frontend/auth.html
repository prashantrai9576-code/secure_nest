<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – Secure Nest</title>
<meta name="description" content="Sign in to Secure Nest smart biometric door security dashboard.">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/auth.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="auth-page">

<div class="auth-bg"></div>
<div class="auth-bg-overlay"></div>
<div class="auth-blob auth-blob-1"></div>
<div class="auth-blob auth-blob-2"></div>

<a href="index.html" class="auth-back" title="Back to Home">
  <i class="fa-solid fa-arrow-left"></i>
</a>

<div class="auth-card">
  <!-- Logo -->
  <div class="auth-logo">
    <div class="auth-logo-icon"><i class="fa-solid fa-fingerprint"></i></div>
    <h1 class="auth-title">Secure Nest</h1>
    <p class="auth-subtitle">Smart Biometric Door Security</p>
  </div>

  <!-- Tabs -->
  <div class="auth-tabs">
    <div class="auth-tab active" id="loginTab" onclick="switchAuthTab('login')">Sign In</div>
    <div class="auth-tab" id="signupTab" onclick="switchAuthTab('signup')">Create Account</div>
  </div>

  <!-- Error Box -->
  <div class="auth-error" id="authError">
    <i class="fa-solid fa-circle-exclamation"></i>
    <span id="authErrorMsg">Invalid credentials.</span>
  </div>

  <!-- LOGIN FORM -->
  <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
    <div class="auth-input-group">
      <label class="auth-form-label">Email Address</label>
      <i class="fa-solid fa-envelope auth-input-icon"></i>
      <input type="email" id="loginEmail" class="auth-input" placeholder="admin@securenest.com" value="admin@securenest.com" required>
    </div>
    <div class="auth-input-group">
      <label class="auth-form-label">Password</label>
      <i class="fa-solid fa-lock auth-input-icon"></i>
      <input type="password" id="loginPassword" class="auth-input" placeholder="••••••••" value="password123" required>
      <span class="auth-input-right" onclick="togglePwd('loginPassword', this)">
        <i class="fa-solid fa-eye"></i>
      </span>
    </div>
    <div class="auth-row">
      <label class="auth-remember">
        <input type="checkbox" id="rememberMe" checked> Remember me
      </label>
      <a href="#" class="auth-forgot" onclick="handleForgotPassword(event)">Forgot password?</a>
    </div>
    <button type="submit" class="auth-submit" id="loginBtn">
      <i class="fa-solid fa-right-to-bracket"></i> Secure Login
    </button>
    <div class="auth-secure-badge">
      <i class="fa-solid fa-shield-check"></i> Protected by Firebase Auth & 256-bit encryption
    </div>
  </form>

  <!-- SIGNUP FORM -->
  <form class="auth-form" id="signupForm" onsubmit="handleSignup(event)">
    <div class="auth-input-group">
      <label class="auth-form-label">Full Name</label>
      <i class="fa-solid fa-user auth-input-icon"></i>
      <input type="text" id="signupName" class="auth-input" placeholder="John Doe" required>
    </div>
    <div class="auth-input-group">
      <label class="auth-form-label">Email Address</label>
      <i class="fa-solid fa-envelope auth-input-icon"></i>
      <input type="email" id="signupEmail" class="auth-input" placeholder="you@example.com" required>
    </div>
    <div class="auth-input-group">
      <label class="auth-form-label">Password</label>
      <i class="fa-solid fa-lock auth-input-icon"></i>
      <input type="password" id="signupPassword" class="auth-input" placeholder="Min. 8 characters" required minlength="8">
      <span class="auth-input-right" onclick="togglePwd('signupPassword', this)">
        <i class="fa-solid fa-eye"></i>
      </span>
    </div>
    <div class="auth-input-group">
      <label class="auth-form-label">Confirm Password</label>
      <i class="fa-solid fa-lock-keyhole auth-input-icon"></i>
      <input type="password" id="signupConfirm" class="auth-input" placeholder="Repeat password" required>
    </div>
    <button type="submit" class="auth-submit" id="signupBtn">
      <i class="fa-solid fa-user-plus"></i> Create Account
    </button>
    <div class="auth-secure-badge">
      <i class="fa-solid fa-shield-check"></i> Your data is encrypted and secure
    </div>
  </form>
</div>

<!-- Toast Container -->
<div id="toast-container"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script>
// Theme
const html = document.documentElement;
html.setAttribute('data-theme', localStorage.getItem('sn_theme') || 'dark');

function switchAuthTab(tab) {
  document.getElementById('loginTab').classList.toggle('active', tab === 'login');
  document.getElementById('signupTab').classList.toggle('active', tab === 'signup');
  document.getElementById('loginForm').classList.toggle('active', tab === 'login');
  document.getElementById('signupForm').classList.toggle('active', tab === 'signup');
  document.getElementById('authError').classList.remove('show');
}

function togglePwd(inputId, btn) {
  const input = document.getElementById(inputId);
  const icon = btn.querySelector('i');
  if (input.type === 'password') {
    input.type = 'text';
    icon.className = 'fa-solid fa-eye-slash';
  } else {
    input.type = 'password';
    icon.className = 'fa-solid fa-eye';
  }
}

function showAuthError(msg) {
  const box = document.getElementById('authError');
  document.getElementById('authErrorMsg').textContent = msg;
  box.classList.add('show');
}

function setLoading(btnId, loading, defaultHtml) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.innerHTML = loading
    ? '<i class="fa-solid fa-circle-notch fa-spin"></i> Please wait...'
    : defaultHtml;
}

function showToast(msg, type='info') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  const icons = {success:'fa-circle-check',danger:'fa-circle-exclamation',warning:'fa-triangle-exclamation',info:'fa-circle-info'};
  t.innerHTML = `<i class="fa-solid ${icons[type]||icons.info}" style="color:var(--color-${type==='danger'?'danger':type==='success'?'success':type==='warning'?'warning':'brand-500'})"></i>${msg}`;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; setTimeout(()=>t.remove(),300); }, 3500);
}
</script>
</body>
</html>

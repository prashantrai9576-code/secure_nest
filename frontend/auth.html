<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up – Secure Nest</title>
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/auth.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="auth-page">

<div class="auth-bg"></div>
<div class="auth-card">
  <div class="auth-logo">
    <div class="auth-logo-icon"><i class="fa-solid fa-fingerprint"></i></div>
    <h1 class="auth-title">Secure Nest</h1>
    <p class="auth-subtitle">Identity Verification Required</p>
  </div>

  <div class="auth-tabs">
    <div class="auth-tab" id="loginTab" onclick="switchAuthTab('login')">Sign In</div>
    <div class="auth-tab active" id="signupTab" onclick="switchAuthTab('signup')">Create Account</div>
  </div>

  <div class="auth-error" id="authError">
    <i class="fa-solid fa-circle-exclamation"></i>
    <span id="authErrorMsg"></span>
  </div>

  <!-- LOGIN FORM -->
  <form class="auth-form" id="loginForm" onsubmit="handleLogin(event)">
    <div class="auth-input-group">
      <label class="auth-form-label">Email Address</label>
      <i class="fa-solid fa-envelope auth-input-icon"></i>
      <input type="email" id="loginEmail" class="auth-input" placeholder="admin@securenest.com" required>
    </div>
    <div class="auth-input-group">
      <label class="auth-form-label">Password</label>
      <i class="fa-solid fa-lock auth-input-icon"></i>
      <input type="password" id="loginPassword" class="auth-input" placeholder="••••••••" required>
    </div>
    <button type="submit" class="auth-submit" id="loginBtn">Secure Login</button>
  </form>

  <!-- SIGNUP FORM WITH OTP -->
  <form class="auth-form active" id="signupForm" onsubmit="handleSignup(event)">
    <div id="signupFields">
      <div class="auth-input-group">
        <label class="auth-form-label">Full Name</label>
        <i class="fa-solid fa-user auth-input-icon"></i>
        <input type="text" id="signupName" class="auth-input" placeholder="John Doe" required>
      </div>
      <div class="auth-input-group">
        <label class="auth-form-label">Email Address</label>
        <i class="fa-solid fa-envelope auth-input-icon"></i>
        <input type="email" id="signupEmail" class="auth-input" placeholder="you@example.com" required>
      </div>
      <div class="auth-input-group">
        <label class="auth-form-label">Password</label>
        <i class="fa-solid fa-lock auth-input-icon"></i>
        <input type="password" id="signupPassword" class="auth-input" placeholder="Min. 8 characters" required minlength="8">
      </div>
      <div class="auth-input-group">
        <label class="auth-form-label">Confirm Password</label>
        <i class="fa-solid fa-lock-keyhole auth-input-icon"></i>
        <input type="password" id="signupConfirm" class="auth-input" placeholder="Repeat password" required>
      </div>
    </div>

    <!-- OTP Section (Hidden initially) -->
    <div id="otpSection" style="display:none; margin-top:1rem; padding:1.25rem; background:rgba(59,130,246,0.1); border-radius:12px; border:1px solid rgba(59,130,246,0.2); animation: slideUp 0.3s ease;">
      <p style="font-size:0.8rem; color:var(--color-primary); margin-bottom:1rem; text-align:center;">
        <i class="fa-solid fa-paper-plane"></i> OTP sent! Check your email or Terminal.
      </p>
      <div class="auth-input-group">
        <label class="auth-form-label">Enter 6-Digit OTP</label>
        <i class="fa-solid fa-key auth-input-icon"></i>
        <input type="text" id="signupOTP" class="auth-input" placeholder="000000" maxlength="6" style="text-align:center; font-size:1.5rem; letter-spacing:8px;">
      </div>
    </div>

    <button type="submit" class="auth-submit" id="signupBtn">
      <i class="fa-solid fa-user-plus"></i> Create Account
    </button>
  </form>
</div>

<div id="toast-container"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script>
function switchAuthTab(tab) {
  document.getElementById('loginTab').classList.toggle('active', tab === 'login');
  document.getElementById('signupTab').classList.toggle('active', tab === 'signup');
  document.getElementById('loginForm').classList.toggle('active', tab === 'login');
  document.getElementById('signupForm').classList.toggle('active', tab === 'signup');
}
function showAuthError(msg) {
  const box = document.getElementById('authError');
  document.getElementById('authErrorMsg').textContent = msg;
  box.classList.add('show');
}
function setLoading(btnId, loading, html) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.innerHTML = loading ? '<i class="fa-solid fa-spinner fa-spin"></i> Processing...' : html;
}
function showToast(msg, type='info') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.innerHTML = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}
</script>
<style>
@keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Nest | Access Hub</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #05070a;
            --card: rgba(15, 23, 42, 0.8);
            --border: rgba(255, 255, 255, 0.08);
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin: 0;
        }

        .bg-glow {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--primary), transparent 70%);
            opacity: 0.15;
            filter: blur(80px);
            z-index: -1;
        }

        .auth-card {
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s ease-out;
        }

        .brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 2rem;
        }

        .tabs {
            display: flex;
            background: rgba(0,0,0,0.2);
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 2rem;
        }

        .tab {
            flex: 1;
            padding: 0.75rem;
            text-align: center;
            cursor: pointer;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
            color: var(--text-muted);
        }

        .tab.active {
            background: var(--primary);
            color: white;
        }

        .input-group {
            margin-bottom: 1.25rem;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        input {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.75rem 1rem 0.75rem 2.75rem;
            color: white;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(0,0,0,0.4);
        }

        .btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }

        #errorMsg {
            color: #ef4444;
            font-size: 0.8rem;
            margin-top: 1rem;
            text-align: center;
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <div class="auth-card">
        <div class="brand">
            <i class="fa-solid fa-shield-halved" style="color: var(--primary);"></i>
            <span>SECURE NEST</span>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Sign In</div>
            <div class="tab" onclick="switchTab('signup')">Sign Up</div>
        </div>

        <!-- Login Form -->
        <form id="loginForm" onsubmit="handleAuth(event, 'login')">
            <div class="input-group">
                <label>EMAIL ADDRESS</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="loginEmail" placeholder="Your email address" required>
                </div>
            </div>
            <div class="input-group">
                <label>PASSWORD</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="loginPass" placeholder="Your password" required>
                </div>
            </div>

            <button type="submit" class="btn">Access System</button>
        </form>

        <!-- Signup Form -->
        <form id="signupForm" class="hidden" onsubmit="handleAuth(event, 'signup')">
            <div class="input-group">
                <label>FULL NAME</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="signupName" placeholder="Prashant Rai" required>
                </div>
            </div>
            <div class="input-group">
                <label>EMAIL ADDRESS</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="signupEmail" placeholder="Email address" required>
                </div>
            </div>
            <div class="input-group">
                <label>CREATE PASSWORD</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="signupPass" placeholder="Min. 8 characters" required minlength="8">
                </div>
            </div>
            <button type="submit" class="btn">Create Account</button>
        </form>

        <p id="errorMsg"></p>
    </div>

    <script src="js/firebase-config.js"></script>
    <script>
        function switchTab(type) {
            document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.innerText.toLowerCase().includes(type)));
            document.getElementById('loginForm').classList.toggle('hidden', type === 'signup');
            document.getElementById('signupForm').classList.toggle('hidden', type === 'login');
            document.getElementById('errorMsg').style.display = 'none';
        }

        async function handleAuth(e, type) {
            e.preventDefault();
            const error = document.getElementById('errorMsg');
            error.style.display = 'none';

            try {
                if (type === 'login') {
                    const email = document.getElementById('loginEmail').value;
                    const pass = document.getElementById('loginPass').value;
                    await auth.signInWithEmailAndPassword(email, pass);
                    window.location.href = 'dashboard.html';
                } else {
                    const name = document.getElementById('signupName').value;
                    const email = document.getElementById('signupEmail').value;
                    const pass = document.getElementById('signupPass').value;
                    const cred = await auth.createUserWithEmailAndPassword(email, pass);
                    
                    // Save extra data to DB
                    await db.ref('users/' + cred.user.uid).set({
                        name: name,
                        email: email,
                        role: 'Owner',
                        createdAt: Date.now()
                    });
                    
                    window.location.href = 'dashboard.html';

                }
            } catch (err) {
                error.innerText = err.message;
                error.style.display = 'block';
            }
        }

        // Redirect if already logged in
        auth.onAuthStateChanged(user => {
            if (user && window.location.pathname.includes('auth.html')) {
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
